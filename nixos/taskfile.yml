version: '3'

tasks:
  default:
    platforms: [linux]
    cmds:
      - sudo nh os switch . -- --impure

  gc:
    platforms: [linux]
    cmds:
      - nix-collect-garbage -d
      - nix-store --optimise -v

  gc:
    platforms: [linux]
    cmds:
      - nix-collect-garbage -d
      - nix-store --optimise -v

  update:
    platforms: [linux]
    cmds:
      - nix flake update
